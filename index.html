<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>Surge 配置与分流 - jkoch14.me</title>
  <meta name="description" content="Surge iOS 自用配置 with self-hosted rules" />

  <style>
    :root{
      --bg:#0f1115;
      --panel:#161a22;
      --panel2:#111521;
      --text:#e6e6e6;
      --muted:#aeb6c2;
      --border:#2a3140;
      --brand:#2f81f7;
      --brand2:#1f6feb;
      --danger:#ff4d4f;
      --ok:#33d17a;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:var(--sans);
      background: radial-gradient(1200px 500px at 50% -10%, rgba(47,129,247,.25), transparent 60%),
                  linear-gradient(180deg, var(--bg), #0b0d12);
      color:var(--text);
    }
    a{ color:var(--brand); text-decoration:none; }
    a:hover{ text-decoration:underline; }
    .wrap{ max-width:980px; margin:0 auto; padding:24px; }
    header{
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(47,129,247,.18), rgba(22,26,34,.9));
      border-radius:14px;
      padding:22px 18px;
    }
    header h1{ margin:0 0 6px; font-size:22px; }
    header p{ margin:0; color:var(--muted); line-height:1.5; }
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
      margin-top:14px;
    }
    @media (min-width: 880px){
      .grid{ grid-template-columns: 1.2fr .8fr; }
    }
    .card{
      border:1px solid var(--border);
      background:rgba(22,26,34,.86);
      border-radius:14px;
      padding:16px;
    }
    .card h2{ margin:0 0 10px; font-size:16px; }
    .card p{ margin:8px 0; color:var(--muted); line-height:1.6; }
    .btns{ display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
    .btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(47,129,247,.20), rgba(47,129,247,.10));
      color:var(--text);
      font-weight:600;
      text-decoration:none !important;
    }
    .btn:hover{ border-color: rgba(47,129,247,.7); }
    .btn.secondary{
      background: rgba(17,21,33,.6);
    }
    .btn.danger{
      background: rgba(255,77,79,.10);
      border-color: rgba(255,77,79,.35);
    }
    code, pre{
      font-family:var(--mono);
    }
    pre{
      margin:10px 0 0;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(17,21,33,.7);
      overflow:auto;
      line-height:1.55;
      font-size:12.5px;
      color:#e9eef7;
    }
    ul{ margin:10px 0 0; padding-left:18px; }
    li{ margin:6px 0; color:var(--muted); }
    .tag{
      display:inline-block;
      font-size:12px;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      color:var(--muted);
      background: rgba(17,21,33,.6);
      margin-left:6px;
    }
    footer{
      margin:18px 0 0;
      color:var(--muted);
      font-size:13px;
      text-align:center;
      padding:16px 0 6px;
    }
    .note{
      border-left:3px solid var(--brand2);
      padding:10px 12px;
      background: rgba(47,129,247,.08);
      border-radius:10px;
      color:var(--muted);
      margin-top:10px;
    }
    .small{ font-size:12.5px; }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>Surge 配置与分流订阅</h1>
      <p>
        当前配置：<strong>US Snell</strong>, <strong>WireGuard(HK)</strong> + 精准规则分流（自定义库）。
        适用于 iOS Surge 一键订阅。
      </p>
      <div class="note small">
        提示：公开仓库时，敏感节点信息不可直接暴露(<code>SERVER_IP/PSK</code>)；推荐如 <code>WireGuard_Public_Key</code>等。
      </div>
    </header>
